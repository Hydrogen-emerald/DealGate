// ── STATE ─────────────────────────────────────────────────────────────────────
let lang = 'en';
let products = [];
let activeCat = 'all';
let priceIdx = 0;
let sortKey = 'newest';
let editId = null;

function t(key) { return (I18N[lang] || I18N.en)[key] || key; }

// ── PERSISTENCE ───────────────────────────────────────────────────────────────
function load() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    products = raw ? JSON.parse(raw) : SAMPLE;
  } catch { products = SAMPLE; }
  if (!products.length) products = SAMPLE;
}
function save() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(products)); } catch {}
}

// ── LANGUAGE ──────────────────────────────────────────────────────────────────
const LANGS = [{ code:'en', label:'EN' },{ code:'fr', label:'FR' },{ code:'es', label:'ES' },{ code:'de', label:'DE' },{ code:'ar', label:'AR' }];

function buildLangStrip() {
  const strip = document.getElementById('lang-strip');
  strip.innerHTML = LANGS.map(l =>
    `<button class="lbtn ${lang===l.code?'active':''}" onclick="setLang('${l.code}')">${l.label}</button>`
  ).join('');
}
function setLang(code) {
  lang = code;
  document.documentElement.lang = code;
  document.body.dir = code === 'ar' ? 'rtl' : 'ltr';
  buildLangStrip();
  updateAllText();
  buildFilters();
  renderGrid();
  renderAdminList();
}
function updateAllText() {
  document.getElementById('tagline-text').textContent = t('tagline');
  document.getElementById('hero-sub').textContent = t('subtitle');
  document.getElementById('disclaimer-text').textContent = t('disclaimer');
  document.getElementById('t-admin').textContent = t('admin');
  document.getElementById('t-adminPanel').textContent = t('adminPanel');
  document.getElementById('t-close').textContent = t('close');
  document.getElementById('lbl-name').textContent = t('productName');
  document.getElementById('lbl-desc').textContent = t('description');
  document.getElementById('lbl-price').textContent = t('price');
  document.getElementById('lbl-cat').textContent = t('category');
  document.getElementById('lbl-link').textContent = t('affiliateLink');
  document.getElementById('lbl-img').textContent = t('imageUrl');
  document.getElementById('lbl-badge').textContent = t('badge');
  document.getElementById('save-btn').textContent = t('save');
  if (editId) {
    document.getElementById('form-section-title').textContent = '✏️ ' + t('editProduct');
    document.getElementById('cancel-edit-btn').textContent = t('cancel');
  } else {
    document.getElementById('form-section-title').textContent = '+ ' + t('addProduct');
  }
  // Rebuild badge select options
  const bSel = document.getElementById('f-badge');
  const bVal = bSel.value;
  bSel.innerHTML = BADGE_KEYS.map(k => `<option value="${k}">${t('badge'+k.charAt(0).toUpperCase()+k.slice(1)||'badgeNone')}</option>`).join('');
  // fix key mapping
  bSel.innerHTML = `<option value="none">${t('badgeNone')}</option><option value="bestSeller">${t('badgeBestSeller')}</option><option value="new">${t('badgeNew')}</option><option value="featured">${t('badgeFeatured')}</option>`;
  bSel.value = bVal || 'none';
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function buildFilters() {
  // Category pills
  const pillContainer = document.getElementById('cat-pills');
  const cats = ['all', ...CATEGORIES];
  pillContainer.innerHTML = cats.map(c =>
    `<button class="pill ${activeCat===c?'active':''}" onclick="setCat('${c}')">${c==='all'?t('allCategories'):c}</button>`
  ).join('');

  // Price select
  const pSel = document.getElementById('price-sel');
  const pVal = pSel.value;
  pSel.innerHTML = PRICE_RANGES.map((r,i) => `<option value="${i}">${t(r.key)}</option>`).join('');
  pSel.value = priceIdx;

  // Sort select
  const sSel = document.getElementById('sort-sel');
  sSel.innerHTML = SORT_KEYS.map(k => `<option value="${k}">${t(k)}</option>`).join('');
  sSel.value = sortKey;
}
function setCat(c) { activeCat = c; buildFilters(); renderGrid(); }
function applyFilters() {
  priceIdx = parseInt(document.getElementById('price-sel').value);
  sortKey  = document.getElementById('sort-sel').value;
  buildFilters();
  renderGrid();
}

// ── GRID RENDER ───────────────────────────────────────────────────────────────
function getDisplayed() {
  let list = [...products];
  if (activeCat !== 'all') list = list.filter(p => p.category === activeCat);
  const { min, max } = PRICE_RANGES[priceIdx];
  list = list.filter(p => p.price >= min && p.price <= max);
  if (sortKey === 'newest')      list.sort((a,b) => b.createdAt - a.createdAt);
  else if (sortKey === 'bestSellers') list.sort((a,b) => (b.badge==='bestSeller'?1:0)-(a.badge==='bestSeller'?1:0));
  else if (sortKey === 'lowToHigh')   list.sort((a,b) => a.price - b.price);
  else if (sortKey === 'highToLow')   list.sort((a,b) => b.price - a.price);
  return list;
}

function renderGrid() {
  const grid = document.getElementById('product-grid');
  const displayed = getDisplayed();
  if (!displayed.length) {
    grid.innerHTML = `<div class="empty-state"><div class="empty-icon">🛒</div><p>${products.length===0?t('noProducts'):t('noMatch')}</p></div>`;
    return;
  }
  grid.innerHTML = `<div class="grid">${displayed.map(cardHTML).join('')}</div>`;
}

function cardHTML(p) {
  const bs = p.badge && BADGE_STYLE[p.badge];
  const imgHTML = p.image
    ? `<img src="${esc(p.image)}" alt="${esc(p.name)}" onerror="this.parentElement.innerHTML='<div class=card-img-placeholder>🛍️</div>'"/>`
    : `<div class="card-img-placeholder">🛍️</div>`;
  const badgeHTML = bs ? `<span class="badge badge-${p.badge}">${t(bs.key)}</span>` : '';
  return `
    <div class="card">
      <div class="card-img">${imgHTML}${badgeHTML}</div>
      <div class="card-body">
        <div class="card-cat">${esc(p.category)}</div>
        <div class="card-name">${esc(p.name)}</div>
        <div class="card-desc">${esc(p.description)}</div>
        <div class="card-price">€${p.price.toFixed(2)}</div>
        <a class="cta" href="${esc(p.affiliateLink)}" target="_blank" rel="noopener noreferrer">${t('viewDeal')} →</a>
      </div>
    </div>`;
}

// ── ADMIN MODAL ───────────────────────────────────────────────────────────────
function openAdmin() {
  const pw = prompt('🔒 Admin password:');
  if (pw === null) return;
  if (pw !== 'Emerald') { alert('Incorrect password.'); return; }
  // Populate category select
  document.getElementById('f-cat').innerHTML = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join('');
  document.getElementById('admin-overlay').classList.add('open');
  updateAllText();
  renderAdminList();
}
function closeAdmin() {
  document.getElementById('admin-overlay').classList.remove('open');
  cancelEdit();
}
function overlayClick(e) { if (e.target === e.currentTarget) closeAdmin(); }

function renderAdminList() {
  const list = document.getElementById('product-list-admin');
  document.getElementById('t-manageList').textContent = `${t('manageList')} (${products.length})`;
  if (!products.length) {
    list.innerHTML = `<p style="color:#aaa;font-size:13px;text-align:center;padding:20px 0">${t('noProducts')}</p>`;
    return;
  }
  list.innerHTML = products.map(p => `
    <div class="prod-row">
      <div class="prod-thumb">${p.image?`<img src="${esc(p.image)}" alt="" onerror="this.style.display='none'"/>`:''}
      </div>
      <div class="prod-info">
        <div class="prod-name-label">${esc(p.name)}</div>
        <div class="prod-meta">€${p.price.toFixed(2)} · ${esc(p.category)}</div>
      </div>
      <button class="edit-btn" onclick="startEdit('${p.id}')">${t('editProd')}</button>
      <button class="del-btn" onclick="deleteProduct('${p.id}')">${t('deleteProd')}</button>
    </div>`).join('');
}

function startEdit(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  editId = id;
  document.getElementById('f-name').value  = p.name;
  document.getElementById('f-desc').value  = p.description || '';
  document.getElementById('f-price').value = p.price;
  document.getElementById('f-cat').value   = p.category;
  document.getElementById('f-link').value  = p.affiliateLink;
  document.getElementById('f-img').value   = p.image || '';
  document.getElementById('f-badge').value = p.badge || 'none';
  document.getElementById('form-section-title').textContent = '✏️ ' + t('editProduct');
  document.getElementById('cancel-edit-btn').style.display = 'block';
  document.querySelector('.modal').scrollTo({top:0, behavior:'smooth'});
}
function cancelEdit() {
  editId = null;
  clearForm();
  document.getElementById('form-section-title').textContent = '+ ' + t('addProduct');
  document.getElementById('cancel-edit-btn').style.display = 'none';
}
function clearForm() {
  ['f-name','f-desc','f-price','f-link','f-img'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('f-cat').value = CATEGORIES[0];
  document.getElementById('f-badge').value = 'none';
}

function saveProduct() {
  const name  = document.getElementById('f-name').value.trim();
  const price = parseFloat(document.getElementById('f-price').value);
  const link  = document.getElementById('f-link').value.trim();
  if (!name || isNaN(price) || !link) {
    alert('Please fill in the required fields (Name, Price, Affiliate Link).');
    return;
  }
  const prod = {
    id: editId || String(Date.now()),
    name,
    description: document.getElementById('f-desc').value.trim(),
    price,
    category:      document.getElementById('f-cat').value,
    affiliateLink: link,
    image:         document.getElementById('f-img').value.trim(),
    badge:         document.getElementById('f-badge').value === 'none' ? null : document.getElementById('f-badge').value,
    createdAt: editId ? (products.find(p=>p.id===editId)?.createdAt || Date.now()) : Date.now(),
  };
  if (editId) {
    products = products.map(p => p.id === editId ? prod : p);
  } else {
    products = [prod, ...products];
  }
  save();
  cancelEdit();
  renderGrid();
  renderAdminList();
}

function deleteProduct(id) {
  if (!confirm('Delete this product?')) return;
  products = products.filter(p => p.id !== id);
  save();
  renderGrid();
  renderAdminList();
}

// ── UTIL ──────────────────────────────────────────────────────────────────────
function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── INIT ──────────────────────────────────────────────────────────────────────
load();
buildLangStrip();
updateAllText();
buildFilters();
// Populate admin category + badge on DOM ready
document.getElementById('f-cat').innerHTML = CATEGORIES.map(c=>`<option value="${c}">${c}</option>`).join('');
document.getElementById('f-badge').innerHTML = `<option value="none">${t('badgeNone')}</option><option value="bestSeller">${t('badgeBestSeller')}</option><option value="new">${t('badgeNew')}</option><option value="featured">${t('badgeFeatured')}</option>`;
renderGrid();
document.getElementById('disclaimer-text').textContent = t('disclaimer');
</script>
</body>
